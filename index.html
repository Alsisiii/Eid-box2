    <script>
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        const checkbox = document.getElementById('openBox');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();


        const image = document.getElementById("playImage");
        const sound = new Audio("music/audio1.mp3");
        let firesound  = new Audio("music/fireworks.mp3")
      
    firesound.loop = true
        sound.loop = true

          image.addEventListener("click", function(){
            firesound.play();  
            image.style.pointerEvents = "none"         
    
        });



        image.addEventListener("click", function(){
            setTimeout(function(){
              sound.play();
         },2000);
        });
 

       

    

          
       

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y;
                const colors = ['#FFD700', '#DAA520', '#FFFACD', '#F9D71C'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                const angle = Math.random() * Math.PI * 2;
                const force = Math.random() * 18 + 5; 
                this.velocity = { x: Math.cos(angle) * force, y: Math.sin(angle) * force };
                this.alpha = 1;
                this.friction = 0.96;
                this.gravity = 0.15;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;
                this.velocity.y += this.gravity;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= 0.006;
            }
        }

        function createFirework() {
            const x = Math.random() * canvas.width;
            const y = Math.random() * (canvas.height * 0.4);
            for (let i = 0; i < 180; i++) particles.push(new Particle(x, y));
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(5, 7, 10, 0.2)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                if (p.alpha > 0) { p.update(); p.draw(); }
                else { particles.splice(i, 1); }
            });
        }

        checkbox.addEventListener('change', function() {
            if (this.checked) {
                createFirework();
                setTimeout(createFirework, 20000);
                setTimeout(createFirework, 20000);
                const interval = setInterval(() => {
                    if(!this.checked) clearInterval(interval);
                    createFirework();
                }, 3300);
            }
        });

        animate();
    </script>
